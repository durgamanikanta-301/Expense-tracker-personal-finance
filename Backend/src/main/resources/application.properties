# ============================================================
# Expense Tracker - Application Configuration
# Spring Boot 3.3.x | MySQL 8 | JWT | Hibernate
# ============================================================

spring.application.name=ExpenseTracker

# ============================================================
# Server
# ============================================================
server.port=${PORT:8080}
server.servlet.context-path=/

# ============================================================
# PostgreSQL DataSource
# Reads from environment variables; falls back to local postgres defaults
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/expense_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ============================================================
# JWT
# In production, set JWT_SECRET env variable to a strong 256-bit key
# ============================================================
app.jwt.secret=${JWT_SECRET:ExpenseTrackerSecretKey123456789012345678901234567890AbcDefGhi}
app.jwt.expiration=86400000

# ============================================================
# Logging
# ============================================================
logging.level.root=INFO
logging.level.com.expensetracker=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Jackson
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC